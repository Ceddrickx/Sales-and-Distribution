/* ===================================================
   FISHER-YATES SHUFFLE (never mutates original)
=================================================== */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ===================================================
   SECTION CONFIG + STABLE ATTEMPT ORDER
=================================================== */
const sections = [
  { type: 'mc', label: 'Multiple Choice', count: 20 },
  { type: 'tf', label: 'True or False', count: 10 },
  { type: 'enum', label: 'Enumeration', count: 3 },
  { type: 'ident', label: 'Identification', count: 10 },
  { type: 'acronym', label: 'Acronym Meaning', count: 5 }
];

let attemptQuestions = [];
let choiceMap = {}; // qId -> { shuffled: [], map: [] }

function buildAttemptQuestions() {
  const ordered = [];
  sections.forEach(sec => {
    const pool = questionBank.filter(q => q.type === sec.type);
    ordered.push(...shuffle(pool));
  });
  return ordered;
}

function initExam() {
  examState.answers = {};
  examState.flagged = {};
  examState.currentStreak = 0;
  examState.longestStreak = 0;
  examState.submitted = false;
  examState.remainingTime = 20 * 60;
  examState.startTime = Date.now();

  // Shuffle once per attempt and keep this exact order until retake
  attemptQuestions = buildAttemptQuestions();

  // Shuffle choices once per attempt and keep them fixed
  choiceMap = {};
  attemptQuestions.forEach(q => {
    if (q.origChoices && q.origChoices.length) {
      const shuffled = shuffle(q.origChoices);
      const mapIdx = shuffled.map(c => q.origChoices.indexOf(c));
      choiceMap[q.id] = { shuffled, mapIdx };
    }
  });

  renderQuestions();
  startTimer();
  updateNav();
  updateProgress();
}

/* ===================================================
   RENDER QUESTIONS
=================================================== */
function renderQuestions() {
  const container = document.getElementById('questions-container');
  container.innerHTML = '';

  let globalIdx = 0;
  sections.forEach(sec => {
    const qs = attemptQuestions.filter(q => q.type === sec.type);
    const secDiv = document.createElement('div');

    const lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.innerHTML = `<div class="label-badge">${sec.label}</div><div class="label-line"></div><div class="label-count">${sec.count} items</div>`;
    secDiv.appendChild(lbl);

    qs.forEach(q => {
      globalIdx++;
      const card = buildQuestionCard(q, globalIdx);
      secDiv.appendChild(card);
    });

    container.appendChild(secDiv);
  });

  document.getElementById('total-count').textContent = attemptQuestions.length;
}

function buildQuestionCard(q, num) {
  const card = document.createElement('div');
  card.className = 'q-card';
  card.id = `q-card-${q.id}`;

  const header = document.createElement('div');
  header.className = 'q-header';
  header.innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
      <div class="q-num">Question ${num}</div>
      <span class="q-diff diff-${q.difficulty}">${q.difficulty}</span>
      <span style="font-size:10px;color:var(--text-sub);opacity:0.6">${q.slideRef}</span>
    </div>
    <button class="flag-btn" id="flag-btn-${q.id}" onclick="toggleFlag(${q.id})" aria-label="Flag question ${num}">⚑ Flag</button>
  `;
  card.appendChild(header);

  const qtext = document.createElement('div');
  qtext.className = 'q-text';
  qtext.textContent = q.question;
  card.appendChild(qtext);

  if (q.type === 'mc' || q.type === 'tf' || q.type === 'ident') {
    const cm = choiceMap[q.id];
    const choicesDiv = document.createElement('div');
    choicesDiv.className = 'choices';
    const labels = ['A', 'B', 'C', 'D'];
    cm.shuffled.forEach((choice, i) => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.id = `choice-${q.id}-${i}`;
      btn.setAttribute('aria-label', `Choice ${labels[i]}: ${choice}`);
      btn.innerHTML = `
        <div class="radio-circle"></div>
        <span class="choice-label">${labels[i]}</span>
        <span>${choice}</span>
      `;
      btn.onclick = () => handleAnswer(q.id, choice, i);
      choicesDiv.appendChild(btn);
    });
    card.appendChild(choicesDiv);
  } else if (q.type === 'enum') {
    const enumDiv = document.createElement('div');
    enumDiv.className = 'enum-inputs';
    const count = q.correctAnswer.length;
    for (let i = 0; i < count; i++) {
      const row = document.createElement('div');
      row.className = 'enum-row';
      row.innerHTML = `<span class="enum-num">${i + 1}.</span>`;
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.className = 'q-input';
      inp.id = `enum-${q.id}-${i}`;
      inp.placeholder = `Item ${i + 1}`;
      inp.setAttribute('aria-label', `Enumeration item ${i + 1}`);
      inp.oninput = () => handleEnumChange(q.id);
      row.appendChild(inp);
      enumDiv.appendChild(row);
    }
    card.appendChild(enumDiv);
  } else if (q.type === 'acronym') {
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.className = 'q-input';
    inp.id = `acronym-${q.id}`;
    inp.placeholder = 'Type the full meaning…';
    inp.setAttribute('aria-label', `Acronym answer for question`);
    inp.oninput = () => handleInputChange(q.id, 'acronym');
    card.appendChild(inp);
  }

  const expl = document.createElement('div');
  expl.className = 'explanation-box';
  expl.id = `expl-${q.id}`;
  card.appendChild(expl);

  return card;
}

/* ===================================================
   HANDLE ANSWER
=================================================== */
function handleAnswer(qId, choice, idx) {
  if (examState.submitted) return;
  examState.answers[qId] = choice;
  const cm = choiceMap[qId];
  cm.shuffled.forEach((c, i) => {
    const btn = document.getElementById(`choice-${qId}-${i}`);
    if (btn) btn.classList.toggle('selected', i === idx);
  });
  updateProgress();
  updateNav();
}

function handleEnumChange(qId) {
  if (examState.submitted) return;
  const q = questionBank.find(x => x.id === qId);
  const vals = [];
  for (let i = 0; i < q.correctAnswer.length; i++) {
    const inp = document.getElementById(`enum-${qId}-${i}`);
    if (inp) vals.push(inp.value.trim());
  }
  examState.answers[qId] = vals;
  updateProgress();
  updateNav();
}

function handleInputChange(qId, type) {
  if (examState.submitted) return;
  const inp = document.getElementById(`${type}-${qId}`);
  if (inp) {
    examState.answers[qId] = inp.value.trim();
    updateProgress();
    updateNav();
  }
}

function toggleFlag(qId) {
  examState.flagged[qId] = !examState.flagged[qId];
  const card = document.getElementById(`q-card-${qId}`);
  const btn = document.getElementById(`flag-btn-${qId}`);
  if (card) card.classList.toggle('flagged', !!examState.flagged[qId]);
  if (btn) btn.classList.toggle('active', !!examState.flagged[qId]);
  updateNav();
}

/* ===================================================
   TIMER
=================================================== */
function startTimer() {
  if (examState.timerInterval) clearInterval(examState.timerInterval);
  examState.timerInterval = setInterval(() => {
    examState.remainingTime--;
    updateTimerDisplay();
    if (examState.remainingTime <= 0) {
      clearInterval(examState.timerInterval);
      submitExam();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const t = examState.remainingTime;
  const m = Math.floor(t / 60);
  const s = t % 60;
  const display = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
  const el = document.getElementById('timer-display');
  el.textContent = display;
  const total = 20 * 60;

  el.classList.remove('warning', 'danger');
  if (t <= 300) el.classList.add('danger');
  else if (t <= total * 0.25) el.classList.add('warning');
}

/* ===================================================
   PROGRESS
=================================================== */
function getAnsweredCount() {
  return attemptQuestions.filter(q => {
    const ans = examState.answers[q.id];
    if (!ans) return false;
    if (Array.isArray(ans)) return ans.some(a => a.length > 0);
    return ans.length > 0;
  }).length;
}

function updateProgress() {
  const answered = getAnsweredCount();
  const total = attemptQuestions.length;
  document.getElementById('answered-count').textContent = answered;
  document.getElementById('total-count').textContent = total;
  document.getElementById('progress-bar-fill').style.width = `${(answered / total) * 100}%`;
}

   NAVIGATOR
=================================================== */
function openNav() {
  document.getElementById('nav-overlay').classList.add('open');
  document.getElementById('nav-panel').classList.add('open');
}
function closeNav() {
  document.getElementById('nav-overlay').classList.remove('open');
  document.getElementById('nav-panel').classList.remove('open');
}

function updateNav() {
  const grid = document.getElementById('nav-grid');
  grid.innerHTML = '';

  attemptQuestions.forEach((q, i) => {
    const btn = document.createElement('button');
    btn.className = 'nav-item';
    btn.textContent = i + 1;
    btn.setAttribute('aria-label', `Jump to question ${i + 1}`);

    const answered = (() => {
      const ans = examState.answers[q.id];
      if (!ans) return false;
      if (Array.isArray(ans)) return ans.some(a => a.length > 0);
      return ans.length > 0;
    })();

    if (examState.submitted) {
      const correct = isCorrect(q);
      if (correct === null) btn.classList.add('skipped-nav');
      else if (correct === true) btn.classList.add('correct-nav');
      else btn.classList.add('wrong-nav');
    } else {
      if (examState.flagged[q.id]) btn.classList.add('flagged-nav');
      else if (answered) btn.classList.add('answered');
    }

    btn.onclick = () => {
      const card = document.getElementById(`q-card-${q.id}`) || document.getElementById(`review-q-${q.id}`);
      if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      closeNav();
    };

    grid.appendChild(btn);
  });
}

/* ===================================================
   CHECK ANSWER
=================================================== */
function normalizeStr(s) {
  return String(s).toLowerCase().trim().replace(/[^a-z0-9\s]/gi, ' ').replace(/\s+/g, ' ').trim();
}

function isCorrect(q) {
  const ans = examState.answers[q.id];
  if (!ans || (Array.isArray(ans) && !ans.some(a => a.length > 0)) || ans === '') return null;

  if (q.type === 'mc' || q.type === 'tf' || q.type === 'ident') {
    const a = normalizeStr(ans);
    const c = normalizeStr(q.correctAnswer);
    if (a === c) return true;
    if (q.altAnswers) {
      for (const alt of q.altAnswers) {
        if (normalizeStr(alt) === a) return true;
      }
    }
    return false;
  }

  if (q.type === 'acronym') {
    const a = normalizeStr(ans);
    const c = normalizeStr(q.correctAnswer);
    if (a === c) return true;
    if (q.altAnswers) {
      for (const alt of q.altAnswers) {
        if (normalizeStr(alt) === a) return true;
      }
    }
    return false;
  }

  if (q.type === 'enum') {
    const answers = (ans || []).map(a => normalizeStr(a));
    const correct = q.correctAnswer.map(c => normalizeStr(c));
    const altFlat = q.altAnswers ? q.altAnswers.flat().map(a => normalizeStr(a)) : [];
    const allValid = [...correct, ...altFlat];
    let matched = 0;
    answers.forEach(a => {
      if (a && allValid.some(v => v.includes(a) || a.includes(v) || v === a)) matched++;
    });
    return matched >= correct.length ? true : (matched > 0 ? 'partial' : false);
  }

  return false;
}

function getEnumScore(q) {
  const ans = examState.answers[q.id] || [];
  const answers = ans.map(a => normalizeStr(a));
  const correct = q.correctAnswer.map(c => normalizeStr(c));
  const altFlat = q.altAnswers ? q.altAnswers.flat().map(a => normalizeStr(a)) : [];
  const allValid = [...correct, ...altFlat];
  let matched = 0;
  answers.forEach(a => {
    if (a && allValid.some(v => v.includes(a) || a.includes(v) || v === a)) matched++;
  });
  return Math.min(matched, correct.length);
}

/* ===================================================
   SUBMIT EXAM
=================================================== */
function submitExam() {
  if (examState.submitted) return;
  examState.submitted = true;
  if (examState.timerInterval) clearInterval(examState.timerInterval);

  let totalScore = 0;
  let totalPoints = 0;
  const sectionScores = { mc: { s: 0, t: 0 }, tf: { s: 0, t: 0 }, enum: { s: 0, t: 0 }, ident: { s: 0, t: 0 }, acronym: { s: 0, t: 0 } };

  attemptQuestions.forEach(q => {
    const pts = q.type === 'enum' ? q.correctAnswer.length : 1;
    totalPoints += pts;
    sectionScores[q.type].t += pts;

    const result = isCorrect(q);
    if (result === true) {
      totalScore += pts;
      sectionScores[q.type].s += pts;
      examState.currentStreak++;
      examState.longestStreak = Math.max(examState.longestStreak, examState.currentStreak);
    } else if (result === 'partial') {
      const ps = getEnumScore(q);
      totalScore += ps;
      sectionScores[q.type].s += ps;
      examState.currentStreak = 0;
    } else {
      examState.currentStreak = 0;
    }
  });

  document.getElementById('streak-count').textContent = examState.longestStreak;
  document.getElementById('exam-form').style.display = 'none';

  renderResults(totalScore, totalPoints, sectionScores);
  updateNav();
}

function renderReview() {
  const container = document.getElementById('review-section');
  container.innerHTML = '<div class="section-label"><div class="label-badge">Review Answers</div><div class="label-line"></div></div>';

  attemptQuestions.forEach((q, idx) => {
    const card = document.createElement('div');
    const result = isCorrect(q);
    card.className = `q-card ${result === true ? 'correct-card' : (result === null ? '' : 'wrong-card')}`;
    card.id = `review-q-${q.id}`;

    const ans = examState.answers[q.id];
    const hasAnswer = ans && (Array.isArray(ans) ? ans.some(a => a.length > 0) : ans.length > 0);

    let statusHTML = '';
    if (result === true) statusHTML = '<div class="result-status status-correct">✓ Correct</div>';
    else if (result === 'partial') statusHTML = '<div class="result-status" style="background:var(--warning-bg, #fef9c3);color:#92400e;">~ Partial Credit</div>';
    else if (!hasAnswer) statusHTML = '<div class="result-status status-skipped">— Skipped</div>';
    else statusHTML = '<div class="result-status status-wrong">✗ Incorrect</div>';

    let answerArea = '';
    if (q.type === 'mc' || q.type === 'tf' || q.type === 'ident') {
      const cm = choiceMap[q.id];
      const labels = ['A', 'B', 'C', 'D'];
      answerArea = '<div class="choices">';
      cm.shuffled.forEach((choice, i) => {
        let cls = 'choice-btn';
        const isSelected = ans === choice;
        const isCorrectChoice = choice === q.correctAnswer;
        if (isSelected && isCorrectChoice) cls += ' correct-choice';
        else if (isSelected && !isCorrectChoice) cls += ' wrong-choice';
        else if (!isSelected && isCorrectChoice) cls += ' missed-choice';
        answerArea += `<button class="${cls}" disabled aria-label="${labels[i]}: ${choice}">
          <div class="radio-circle"></div>
          <span class="choice-label">${labels[i]}</span>
          <span>${choice}</span>
        </button>`;
      });
      answerArea += '</div>';
    } else if (q.type === 'enum') {
      const answers = ans || [];
      answerArea = '<div class="enum-inputs">';
      q.correctAnswer.forEach((ca, i) => {
        const userAns = answers[i] || '';
        const norm = normalizeStr(userAns);
        const normCA = normalizeStr(ca);
        const altFlat = q.altAnswers ? q.altAnswers.flat().map(a => normalizeStr(a)) : [];
        const isOk = norm && (normCA.includes(norm) || norm.includes(normCA) || norm === normCA || altFlat.some(v => v.includes(norm) || norm.includes(v)));
        answerArea += `<div class="enum-row">
          <span class="enum-num">${i + 1}.</span>
          <input class="q-input ${userAns ? (isOk ? 'correct-input' : 'wrong-input') : ''}" value="${userAns || ''}" disabled placeholder="(Skipped)" style="flex:1"/>
          <span style="font-size:12px;color:var(--text-sub);margin-left:6px">${isOk ? '✓' : `→ ${ca}`}</span>
        </div>`;
      });
      answerArea += '</div>';
    } else if (q.type === 'acronym') {
      const isOk = result === true;
      answerArea = `<input class="q-input ${ans ? (isOk ? 'correct-input' : 'wrong-input') : ''}" value="${ans || ''}" disabled placeholder="(No answer)" style="width:100%"/>`;
      if (!isOk) {
        answerArea += `<div style="font-size:13px;color:var(--correct);margin-top:6px">✓ Correct answer: <strong>${q.correctAnswer}</strong></div>`;
      }
    }

    let explHTML = '';
    if (q.type === 'mc' || q.type === 'tf' || q.type === 'ident') {
      const labels = ['A', 'B', 'C', 'D'];
      explHTML = '<div style="margin-bottom:8px;font-size:12px;color:var(--text-sub);font-style:italic">Explanations shown in original logical order:</div>';
      q.origChoices.forEach((choice, i) => {
        const isCorrectOrig = choice === q.correctAnswer;
        explHTML += `<div class="why-item">
          <span class="why-label ${isCorrectOrig ? 'correct-label' : ''}">${labels[i]}. ${choice}:</span>
          <span style="color:var(--text-sub)"> ${q.origWhy[i]}</span>
        </div>`;
      });
    } else {
      explHTML = `<div style="color:var(--text)">${q.origWhy[0]}</div>`;
      explHTML += `<div style="margin-top:8px;color:var(--correct);font-weight:600">✓ Correct answer: ${Array.isArray(q.correctAnswer) ? q.correctAnswer.join(' / ') : q.correctAnswer}</div>`;
    }

    card.innerHTML = `
      <div class="q-header">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          <div class="q-num">Question ${idx + 1}</div>
          <span class="q-diff diff-${q.difficulty}">${q.difficulty}</span>
        </div>
      </div>
      <div class="q-text">${q.question}</div>
      ${answerArea}
      ${statusHTML}
      <div class="explanation-box show" style="display:block">${explHTML}</div>
    `;
    container.appendChild(card);
  });
}

/* ===================================================
   RETAKE
=================================================== */
function retakeExam() {
  if (examState.timerInterval) clearInterval(examState.timerInterval);
  document.getElementById('results-section').style.display = 'none';
  document.getElementById('results-section').classList.remove('show');
  document.getElementById('exam-form').style.display = 'block';
  document.getElementById('review-section').innerHTML = '';
  document.getElementById('timer-display').classList.remove('warning', 'danger');
  document.getElementById('streak-count').textContent = '0';
  window.scrollTo({ top: 0, behavior: 'smooth' });
  initExam();
}

/* ===================================================
   DARK MODE
=================================================== */
function toggleDark() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
  const btn = document.getElementById('dark-btn');
  btn.textContent = isDark ? '🌙 Dark' : '☀ Light';
}

/* ===================================================
   DATES
=================================================== */
function setDates() {
  const d = new Date();
  const opts = { year: 'numeric', month: 'long', day: 'numeric' };
  const dateStr = d.toLocaleDateString('en-US', opts);
  const topDate = document.getElementById('top-date');
  const footerDate = document.getElementById('footer-date');
  if (topDate) topDate.textContent = dateStr;
  if (footerDate) footerDate.textContent = `Generated: ${dateStr}`;
}

/* ===================================================
   INIT
=================================================== */
document.addEventListener('DOMContentLoaded', () => {
  setDates();
  initExam();
});
</script>
